[config]
schemaVersion = "0.0.1"


[package]
namespace = "NikkelM"
name = "Music_Maker_API"
versionNumber = "1.1.0"
description = "Developer library to simplify adding new songs to the Music Maker in Hades II. Does nothing by itself."
websiteUrl = "https://github.com/NikkelM/Hades-II-MusicMakerAPI"
containsNsfwContent = false

[package.dependencies]
Hell2Modding-Hell2Modding = "1.0.106"
LuaENVY-ENVY = "1.2.0"
SGG_Modding-Chalk = "2.1.1"
SGG_Modding-ReLoad = "1.0.2"
SGG_Modding-SJSON = "1.0.1"
SGG_Modding-ModUtil = "4.0.1"


[build]
icon = "./icon.png"
readme = "./README.md"
outdir = "./build"

[[build.copy]]
source = "./CHANGELOG.md"
target = "./CHANGELOG.md"

[[build.copy]]
source = "./LICENSE"
target = "./LICENSE"

[[build.copy]]
source = "./src"
target = "./plugins"


[publish]
repository = "https://thunderstore.io"
communities = [ "hades-ii", ]

[publish.categories]
hades-ii = [ "mods", "tools", "libraries" ]
